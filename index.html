<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cetakan Sijil Daurah 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Gaya Antaramuka (Hanya muncul di skrin) */
        @media screen {
            .control-panel {
                position: sticky; top: 0; background: #ffffff; padding: 25px;
                border-bottom: 4px solid #d4af37; z-index: 1000; width: 100%;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
            }
            .filter-section { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
            .name-selector { 
                max-height: 250px; overflow-y: auto; border: 1px solid #ddd; 
                padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 8px; text-align: left; width: 100%; background: #fdfdfd; border-radius: 8px;
            }
            .name-item { font-size: 13px; display: flex; align-items: center; gap: 10px; }
            .preview-link { 
                color: #2980b9; cursor: pointer; text-decoration: underline; 
                font-weight: 600; font-family: 'Open Sans', sans-serif;
            }
            
            /* Modal Preview */
            #preview-modal {
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.85); z-index: 2000; overflow-y: auto; padding: 40px 20px;
            }
            .modal-content { background: #fff; margin: auto; padding: 15px; width: fit-content; border-radius: 8px; position: relative; }
            .close-btn { position: absolute; top: -35px; right: 0; color: white; font-size: 24px; cursor: pointer; font-family: sans-serif; }
            .preview-tag { background: #d4af37; color: white; padding: 4px 12px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; display: inline-block; font-family: 'Open Sans', sans-serif; }
            
            .action-btn { background: #27ae60; color: white; border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; margin-top: 15px; font-family: 'Open Sans', sans-serif; }
            .action-btn:hover { background: #219150; transform: translateY(-2px); }
            .btn-small { padding: 5px 10px; font-size: 12px; background: #d4af37; color: white; border: none; border-radius: 3px; cursor: pointer; }
        }
    </style>
</head>
<body>

    <div class="no-print control-panel">
        <h2 style="margin-top:0; font-family: 'Open Sans', sans-serif;">Sistem Pengurusan Sijil Daurah</h2>
        
        <div class="filter-section">
            <div>
                <label><strong>1. Tapis Kumpulan:</strong></label><br>
                <select id="group-filter" onchange="filterData()" style="padding: 8px; border-radius: 5px; width: 250px;">
                    <option value="ALL">SEMUA KUMPULAN</option>
                    <option value="DAURAH QURAN USTAZ NUAIM">USTAZ NUAIM</option>
                    <option value="DAURAH QURAN USTAZ ARIF">USTAZ ARIF</option>
                    <option value="DAURAH QURAN USTAZ AIMAN">USTAZ AIMAN</option>
                </select>
            </div>
            <div>
                <label><strong>2. Pilihan Cepat:</strong></label><br>
                <button class="btn-small" onclick="toggleAll(true)">Pilih Semua</button>
                <button class="btn-small" onclick="toggleAll(false)" style="background:#888;">Kosongkan</button>
            </div>
        </div>

        <label><strong>3. Klik Nama untuk Preview | Tanda untuk Cetak:</strong></label>
        <div id="name-list" class="name-selector"></div>

        <button class="action-btn" onclick="generateAndPrint()">CETAK SIJIL TERPILIH (PDF)</button>
        <p style="font-size: 12px; color: #666;">Status: <span id="status-text">Memuatkan data...</span></p>
    </div>

    <div id="preview-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePreview()">✕ Tutup Preview</span>
            <span class="preview-tag">PRATONTON SIJIL</span>
            <div id="preview-area"></div>
        </div>
    </div>

    <div id="certificate-container"></div>

    <script>
        let masterData = [];

        // Service Worker untuk kegunaan offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        // Muat Data Peserta
        async function loadData() {
            try {
                const res = await fetch('data.json');
                masterData = await res.json();
                renderNameList(masterData);
                document.getElementById('status-text').innerText = masterData.length + " peserta ditemui.";
            } catch (e) {
                document.getElementById('status-text').innerText = "Ralat memuatkan data.json!";
            }
        }

        // Papar Senarai Nama
        function renderNameList(data) {
            const listDiv = document.getElementById('name-list');
            listDiv.innerHTML = '';
            data.forEach((item, index) => {
                listDiv.innerHTML += `
                    <div class="name-item" data-group="${item.kumpulan}">
                        <input type="checkbox" class="cert-checkbox" id="user-${index}" value="${index}" checked>
                        <label for="user-${index}" style="cursor:pointer;">
                            <span class="preview-link" onclick="showPreview(${index}); event.preventDefault();">${item.nama}</span>
                            <br><small>${item.ic}</small>
                        </label>
                    </div>
                `;
            });
        }

        /**
         * FUNGSI UTAMA: Bina Template Sijil
         * Mengandungi kemas kini Logo (140px), Google Sans, dan Ayat Sesi.
         */
        function createCertTemplate(item) {
            return `
                <div class="certificate">
                    <div class="content-overlay">
                        <div class="header-with-logos">
                            <img src="logo_masjid.png" class="logo-left" alt="Logo Masjid">
                            
                            <div class="header-text">
                                <p class="institution">MASJID KAMPUNG SUNGAI LANG BARU</p>
                                <h1 class="title">Sijil Penyertaan</h1>
                                <p class="sub-title">Dengan ini diperakukan bahawa</p>
                            </div>

                            <img src="logo_daurahquran.png" class="logo-right" alt="Logo Program">
                        </div>

                        <div class="participant-name">${item.nama}</div>
                        <div class="participant-ic">No. K/P: ${item.ic}</div>

                        <div class="program-info">
                            Telah berjaya mengikuti <strong>sepanjang sesi</strong> intensif setiap Sabtu & Ahad (8:15 AM - 10:45 AM)<br>
                            <span class="program-name">DAURAH REMAJA QURAN 2026</span><br>
                            Sepanjang Bulan Ramadan 1447H
                        </div>

                        <table class="sessions-grid">
                            <tr><td>Sesi 1: 28 Feb</td><td>Sesi 2: 1 Mac</td><td>Sesi 3: 7 Mac</td><td>Sesi 4: 8 Mac</td></tr>
                            <tr><td>Sesi 5: 14 Mac</td><td>Sesi 6: 15 Mac</td><td>Sesi 7: 21 Mac</td><td>Sesi 8: 22 Mac</td></tr>
                        </table>

                        <div class="signatures">
                            <div class="sig-wrapper">
                                <img src="tandatangannazir.png" class="signature-img">
                                <div class="sig-line single-sig">
                                    <strong>( NAZIR MASJID )</strong><br>
                                    Masjid Kampung Sungai Lang Baru
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Logik Preview
        function showPreview(idx) {
            const area = document.getElementById('preview-area');
            area.innerHTML = createCertTemplate(masterData[idx]);
            document.getElementById('preview-modal').style.display = 'block';
        }

        function closePreview() {
            document.getElementById('preview-modal').style.display = 'none';
        }

        // Logik Tapisan (Filter)
        function filterData() {
            const group = document.getElementById('group-filter').value;
            document.querySelectorAll('.name-item').forEach(item => {
                const match = (group === "ALL" || item.getAttribute('data-group') === group);
                item.style.display = match ? "flex" : "none";
                item.querySelector('input').checked = match;
            });
        }

        function toggleAll(status) {
            document.querySelectorAll('.cert-checkbox').forEach(cb => {
                if(cb.parentElement.style.display !== "none") cb.checked = status;
            });
        }

        // Logik Cetakan
        function generateAndPrint() {
            const container = document.getElementById('certificate-container');
            container.innerHTML = '';
            const checked = document.querySelectorAll('.cert-checkbox:checked');
            
            if (checked.length === 0) return alert("Sila pilih sekurang-kurangnya satu nama!");

            checked.forEach(cb => {
                container.innerHTML += createCertTemplate(masterData[cb.value]) + '<div class="page-break"></div>';
            });

            // Beri masa untuk browser render imej sebelum print
            setTimeout(() => { window.print(); }, 800);
        }

        loadData();
    </script>
</body>
</html>
