<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cetakan Sijil Daurah 2026</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Gaya tambahan untuk susun atur panel kawalan (Hanya untuk paparan skrin) */
        @media screen {
            .control-panel {
                position: sticky; 
                top: 0; 
                background: #ffffff; 
                padding: 25px;
                border-bottom: 4px solid #d4af37; 
                z-index: 1000; 
                width: 100%;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
                text-align: center;
            }
            .filter-section { 
                display: flex; 
                gap: 20px; 
                flex-wrap: wrap; 
                justify-content: center; 
                margin-bottom: 20px; 
            }
            .name-selector { 
                max-height: 250px; 
                overflow-y: auto; 
                border: 1px solid #ddd; 
                padding: 15px; 
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 8px; 
                text-align: left; 
                width: 100%; 
                background: #fdfdfd; 
                border-radius: 8px;
            }
            .name-item { font-size: 13px; display: flex; align-items: center; gap: 10px; }
            .preview-link { 
                color: #2980b9; 
                cursor: pointer; 
                text-decoration: underline; 
                font-weight: 600; 
            }
            .btn-small { 
                padding: 5px 10px; 
                font-size: 12px; 
                background: #d4af37; 
                color: white; 
                border: none; 
                border-radius: 3px; 
                cursor: pointer; 
            }
            .action-btn { 
                color: white; 
                border: none; 
                padding: 12px 30px; 
                font-size: 18px; 
                font-weight: bold; 
                border-radius: 5px; 
                cursor: pointer; 
                transition: 0.3s; 
                margin-top: 15px; 
            }
            .close-btn { 
                position: absolute; 
                top: 10px; 
                right: 20px; 
                color: #333; 
                font-size: 28px; 
                cursor: pointer; 
                font-weight: bold; 
                z-index: 10001;
            }
            
            /* Footer dalam modal untuk pengesahan */
            .preview-footer {
                margin-top: 20px;
                padding: 20px;
                border-top: 2px solid #ddd;
                width: 100%;
                background: #f9f9f9;
                text-align: center;
                border-radius: 0 0 12px 12px;
            }

            /* Container Pralihat agar sijil nampak seimbang di skrin */
            #preview-area {
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="no-print control-panel">
        <h2 style="margin-top:0; font-family: 'Cinzel', serif; color: #996515;">Sistem Cetakan Sijil Daurah 2026</h2>
        
        <div class="filter-section">
            <div>
                <label><strong>1. Tapis Kumpulan:</strong></label><br>
                <select id="group-filter" onchange="filterData()" style="padding: 8px; border-radius: 5px; width: 250px;">
                    <option value="ALL">SEMUA KUMPULAN</option>
                    <option value="DAURAH QURAN USTAZ NUAIM">USTAZ NUAIM</option>
                    <option value="DAURAH QURAN USTAZ ARIF">USTAZ ARIF</option>
                    <option value="DAURAH QURAN USTAZ AIMAN">USTAZ AIMAN</option>
                </select>
            </div>
            <div>
                <label><strong>2. Pilihan Cepat:</strong></label><br>
                <button class="btn-small" onclick="toggleAll(true)">Pilih Semua</button>
                <button class="btn-small" onclick="toggleAll(false)" style="background:#888;">Kosongkan</button>
            </div>
            <div>
                <label><strong>3. Orientasi:</strong></label><br>
                <select id="orientation-selector" onchange="updateOrientation()" style="padding: 8px; border-radius: 5px; width: 150px; font-weight: bold; border: 2px solid #d4af37;">
                    <option value="landscape">LANDSCAPE</option>
                    <option value="portrait">PORTRAIT</option>
                </select>
            </div>
        </div>

        <label><strong>4. Klik Nama untuk Preview | Tanda untuk Cetak:</strong></label>
        <div id="name-list" class="name-selector"></div>

        <button class="action-btn" onclick="generateAndPreviewBulk()" style="background: #27ae60;">
            👁️ PREVIEW SEMUA PILIHAN
        </button>
        
        <p id="status-text" style="font-size: 12px; color: #666;">Memuatkan data...</p>
    </div>

    <div id="preview-modal" class="no-print">
        <div class="modal-content">
            <span class="close-btn" onclick="closePreview()">&times;</span>
            <div class="preview-tag">PRALIHAT DOKUMEN & PELARASAN REKA BENTUK</div>
            
            <div id="preview-area"></div>

            <div class="preview-footer">
                <p style="margin-bottom: 15px; color: #444; font-weight: 600;">
                    Sila semak semua ejaan nama dan nombor kad pengenalan sebelum mencetak.
                </p>
                
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button id="modal-confirm-btn" class="action-btn" style="background: #c0392b; width: 350px; margin-top: 0;">
                        ✅ SAHKAN & CETAK SEKARANG
                    </button>
                    
                    <button onclick="closePreview()" class="action-btn" style="background: #7f8c8d; margin-top: 0;">
                        BATAL
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="certificate-container"></div>

    <script src="script.js"></script>

</body>
</html>
