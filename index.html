<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cetakan Sijil Daurah 2026</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Gaya tambahan untuk susun atur panel kawalan (Hanya untuk paparan skrin) */
        @media screen {
            .control-panel {
                position: sticky; 
                top: 0; 
                background: #ffffff; 
                padding: 25px;
                border-bottom: 4px solid #d4af37; 
                z-index: 1000; 
                width: 100%;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
                text-align: center;
            }
            .filter-section { 
                display: flex; 
                gap: 20px; 
                flex-wrap: wrap; 
                justify-content: center; 
                margin-bottom: 20px; 
            }
            .name-selector { 
                max-height: 350px; 
                overflow-y: auto; 
                border: 1px solid #ddd; 
                padding: 15px; 
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 12px; 
                text-align: left; 
                width: 100%; 
                background: #fdfdfd; 
                border-radius: 8px;
            }
            .name-item { 
                background: white;
                padding: 10px;
                border: 1px solid #eee;
                border-radius: 6px;
                font-size: 13px; 
                display: flex; 
                align-items: center; 
                justify-content: space-between;
                transition: 0.2s;
            }
            .name-item:hover {
                border-color: #d4af37;
                background: #fffdf0;
            }
            .preview-link { 
                color: #2c3e50; 
                cursor: pointer; 
                text-decoration: none; 
                font-weight: 700; 
            }
            .preview-link:hover {
                color: #996515;
                text-decoration: underline;
            }
            .btn-small { 
                padding: 5px 10px; 
                font-size: 12px; 
                background: #d4af37; 
                color: white; 
                border: none; 
                border-radius: 3px; 
                cursor: pointer; 
            }

            .action-btn { 
                color: white; 
                border: none; 
                padding: 12px 30px; 
                font-size: 18px; 
                font-weight: bold; 
                border-radius: 5px; 
                cursor: pointer; 
                transition: 0.3s; 
                margin-top: 15px; 
            }
            /* Style Modal Preview (Kekalkan gaya asal awak) */
            #preview-modal {
                display: none;
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: rgba(0,0,0,0.85);
                z-index: 2000;
                overflow-y: auto;
                padding: 20px;
            }
            .modal-content {
                background: white;
                max-width: 1100px;
                margin: 0 auto;
                padding: 30px;
                border-radius: 12px;
                position: relative;
            }
            .close-btn { 
                position: absolute; 
                top: 15px; 
                right: 25px; 
                color: #333; 
                font-size: 35px; 
                cursor: pointer; 
                font-weight: bold; 
            }
            
            .preview-tag {
                background: #d4af37;
                color: white;
                padding: 8px 25px;
                border-radius: 50px;
                font-size: 12px;
                font-weight: bold;
                text-align: center;
                margin: 0 auto 25px auto;
                display: table;
            }

            .preview-footer {
                margin-top: 30px;
                padding-top: 20px;
                border-top: 2px solid #eee;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="no-print control-panel">
        <h2 style="margin-top:0; font-family: 'Cinzel', serif; color: #996515;">Sistem Cetakan Sijil Daurah 2026</h2>
        
        <div class="filter-section">
            <div>
                <label><strong>1. Tapis Kumpulan:</strong></label><br>
                <select id="group-filter" onchange="filterData()" style="padding: 8px; border-radius: 5px; width: 250px;">
                    <option value="ALL">SEMUA KUMPULAN</option>
                    <option value="DAURAH QURAN USTAZ NUAIM">USTAZ NUAIM</option>
                    <option value="DAURAH QURAN USTAZ ARIF">USTAZ ARIF</option>
                    <option value="DAURAH QURAN USTAZ AIMAN">USTAZ AIMAN</option>
                    <option value="PEMBIMBING">PEMBIMBING</option>
                </select>
            </div>
            <div>
                <label><strong>2. Pilihan Cepat:</strong></label><br>
                <button class="btn-small" onclick="toggleAll(true)">Pilih Semua</button>
                <button class="btn-small" onclick="toggleAll(false)" style="background:#888;">Kosongkan</button>
            </div>
            <div>
                <label><strong>3. Orientasi:</strong></label><br>
                <select id="orientation-selector" onchange="updateOrientation()" style="padding: 8px; border-radius: 5px; width: 150px; font-weight: bold; border: 2px solid #d4af37;">
                    <option value="portrait" selected>PORTRAIT</option>
                    <option value="landscape">LANDSCAPE</option>
                </select>
            </div>
        </div>

        <label style="display:block; margin-bottom: 10px;"><strong>4. Senarai Peserta (Klik nama untuk Pralihat):</strong></label>
        <div id="name-list" class="name-selector">
            </div>

        <div style="display: flex; gap: 15px; justify-content: center;">
            <button class="action-btn" onclick="generateAndPreviewBulk()" style="background: #27ae60;">
                👁️ PREVIEW SEMUA PILIHAN
            </button>

            <button id="btn-bulk-telegram" class="action-btn" onclick="hantarSemuaPilihan()" style="background: #e67e22;">
                🚀 AUTO-RUN KE TELEGRAM
            </button>
        </div>
        
        <p id="status-text" style="font-size: 14px; font-weight: bold; color: #333; margin-top: 15px;">Memuatkan data...</p>
    </div>

    <div id="preview-modal" class="no-print">
        <div class="modal-content">
            <span class="close-btn" onclick="closePreview()">&times;</span>
            <div class="preview-tag">PRALIHAT DOKUMEN & PELARASAN REKA BENTUK</div>
            
            <div id="preview-area">
                </div>

            <div class="preview-footer">
                <p style="margin-bottom: 15px; color: #444; font-weight: 600;">
                    Sila semak semua ejaan nama dan nombor kad pengenalan sebelum mencetak.
                </p>
                
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button onclick="window.print()" class="action-btn" style="background: #c0392b; width: 350px; margin-top: 0;">
                        ✅ SAHKAN & CETAK SEKARANG
                    </button>
                    
                    <button onclick="closePreview()" class="action-btn" style="background: #7f8c8d; margin-top: 0;">
                        BATAL
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="certificate-container"></div>

    <script src="print-engine.js"></script>
    <script src="script.js"></script>

</body>
</html>
