<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cetakan Sijil Daurah 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        @media screen {
            .control-panel {
                position: sticky; top: 0; background: #ffffff; padding: 25px;
                border-bottom: 4px solid #d4af37; z-index: 1000; width: 100%;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
            }
            .name-selector { 
                max-height: 250px; overflow-y: auto; border: 1px solid #ddd; 
                padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 8px; background: #fdfdfd; border-radius: 8px;
            }
            .name-item { font-size: 13px; display: flex; align-items: center; gap: 10px; }
            .preview-link { color: #2980b9; cursor: pointer; text-decoration: underline; font-weight: 600; }
            
            /* Modal Preview Styling */
            #preview-modal {
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.9); z-index: 9999; overflow-y: auto; padding: 20px;
            }
            .modal-content { 
                background: #fff; margin: 20px auto; padding: 20px; width: fit-content; 
                border-radius: 12px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                display: flex; flex-direction: column; align-items: center;
            }
            .close-btn { position: absolute; top: 10px; right: 20px; color: #333; font-size: 28px; cursor: pointer; font-weight: bold; }
            .preview-footer { margin-top: 20px; padding: 20px; border-top: 1px solid #eee; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="no-print control-panel">
        <h2 style="margin-top:0; font-family: 'Open Sans', sans-serif;">Sistem Cetakan Sijil Daurah 2026</h2>
        
        <div style="margin-bottom: 20px;">
            <label><strong>1. Tapis Kumpulan:</strong></label>
            <select id="group-filter" onchange="filterData()" style="padding: 8px; border-radius: 5px;">
                <option value="ALL">SEMUA KUMPULAN</option>
                <option value="DAURAH QURAN USTAZ NUAIM">USTAZ NUAIM</option>
                <option value="DAURAH QURAN USTAZ ARIF">USTAZ ARIF</option>
                <option value="DAURAH QURAN USTAZ AIMAN">USTAZ AIMAN</option>
            </select>
            <button class="btn-small" onclick="toggleAll(true)" style="margin-left:10px;">Pilih Semua</button>
            <button class="btn-small" onclick="toggleAll(false)" style="background:#888;">Kosongkan</button>
        </div>

        <div id="name-list" class="name-selector"></div>
        <button class="action-btn" onclick="generateAndPrint()" style="margin-top:20px;">CETAK PUKAL (TERPILIH)</button>
        <p id="status-text" style="font-size:12px; color:#666;">Memuatkan data...</p>
    </div>

    <div id="preview-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePreview()">&times;</span>
            <div style="margin-bottom:10px;"><span class="preview-tag">PRATONTON SIJIL</span></div>
            
            <div id="preview-area"></div>

            <div class="preview-footer">
                <button class="action-btn" id="modal-print-btn" style="background: #27ae60; width: 300px;">
                    CETAK SIJIL INI
                </button>
            </div>
        </div>
    </div>

    <div id="certificate-container"></div>

    <script>
        let masterData = [];

        async function loadData() {
            try {
                const res = await fetch('data.json');
                masterData = await res.json();
                renderNameList(masterData);
                document.getElementById('status-text').innerText = masterData.length + " peserta sedia ada."; [cite: 5]
            } catch (e) {
                document.getElementById('status-text').innerText = "Ralat memuatkan data!";
            }
        }

        function renderNameList(data) {
            const listDiv = document.getElementById('name-list');
            listDiv.innerHTML = '';
            data.forEach((item, index) => {
                listDiv.innerHTML += `
                    <div class="name-item" data-group="${item.kumpulan}">
                        <input type="checkbox" class="cert-checkbox" id="user-${index}" value="${index}" checked>
                        <label for="user-${index}">
                            <span class="preview-link" onclick="showPreview(${index})">${item.nama}</span>
                        </label>
                    </div>
                `;
            });
        }

        function createCertTemplate(item) {
            return `
                <div class="certificate">
                    <div class="content-overlay">
                        <div class="header-with-logos">
                            <img src="logo_masjid.png" class="logo-left">
                            <div class="header-text">
                                <p class="institution">MASJID KAMPUNG SUNGAI LANG BARU</p>
                                <h1 class="title">Sijil Penyertaan</h1>
                                <p class="sub-title">Dengan ini diperakukan bahawa</p>
                            </div>
                            <img src="logo_daurahquran.png" class="logo-right">
                        </div>
                        <div class="participant-name">${item.nama}</div>
                        <div class="participant-ic">No. K/P: ${item.ic}</div>
                        <div class="program-info">
                            Telah berjaya mengikuti <strong>sepanjang sesi</strong> intensif setiap Sabtu & Ahad (8:15 AM - 10:45 AM)<br>
                            <span class="program-name">DAURAH REMAJA QURAN 2026</span><br>
                            Sepanjang Bulan Ramadan 1447H
                        </div>
                        <table class="sessions-grid">
                            <tr><td>Sesi 1: 28 Feb</td><td>Sesi 2: 1 Mac</td><td>Sesi 3: 7 Mac</td><td>Sesi 4: 8 Mac</td></tr>
                            <tr><td>Sesi 5: 14 Mac</td><td>Sesi 6: 15 Mac</td><td>Sesi 7: 21 Mac</td><td>Sesi 8: 22 Mac</td></tr>
                        </table>
                        <div class="signatures">
                            <div class="sig-wrapper">
                                <img src="tandatangannazir.png" class="signature-img">
                                <div class="sig-line single-sig">
                                    <strong>( NAZIR MASJID )</strong><br>
                                    Masjid Kampung Sungai Lang Baru
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function showPreview(idx) {
            const area = document.getElementById('preview-area');
            area.innerHTML = createCertTemplate(masterData[idx]);
            document.getElementById('modal-print-btn').onclick = function() { printCert(idx); };
            document.getElementById('preview-modal').style.display = 'block';
        }

        function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

        function printCert(idx) {
            const container = document.getElementById('certificate-container');
            container.innerHTML = createCertTemplate(masterData[idx]);
            setTimeout(() => { window.print(); }, 500);
        }

        function generateAndPrint() {
            const container = document.getElementById('certificate-container');
            container.innerHTML = '';
            const checked = document.querySelectorAll('.cert-checkbox:checked');
            if (checked.length === 0) return alert("Pilih nama!");
            checked.forEach(cb => {
                container.innerHTML += createCertTemplate(masterData[cb.value]) + '<div class="page-break"></div>';
            });
            setTimeout(() => { window.print(); }, 800);
        }

        function filterData() {
            const group = document.getElementById('group-filter').value;
            document.querySelectorAll('.name-item').forEach(item => {
                const match = (group === "ALL" || item.getAttribute('data-group') === group);
                item.style.display = match ? "flex" : "none";
                item.querySelector('input').checked = match;
            });
        }

        function toggleAll(status) {
            document.querySelectorAll('.cert-checkbox').forEach(cb => {
                if(cb.parentElement.style.display !== "none") cb.checked = status;
            });
        }

        loadData();
    </script>
</body>
</html>
