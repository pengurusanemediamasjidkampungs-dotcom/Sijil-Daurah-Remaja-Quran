<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cetakan Sijil Daurah 2026</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Gaya tambahan untuk susun atur panel kawalan (Hanya untuk paparan skrin) */
        @media screen {
            .control-panel {
                position: sticky; 
                top: 0; 
                background: #ffffff; 
                padding: 25px;
                border-bottom: 4px solid #d4af37; 
                z-index: 1000; 
                width: 100%;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
                text-align: center;
            }
            .filter-section { 
                display: flex; 
                gap: 20px; 
                flex-wrap: wrap; 
                justify-content: center; 
                margin-bottom: 20px; 
            }
            .name-selector { 
                max-height: 250px; 
                overflow-y: auto; 
                border: 1px solid #ddd; 
                padding: 15px; 
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 8px; 
                text-align: left; 
                width: 100%; 
                background: #fdfdfd; 
                border-radius: 8px;
            }
            .name-item { font-size: 13px; display: flex; align-items: center; gap: 10px; }
            .preview-link { 
                color: #2980b9; 
                cursor: pointer; 
                text-decoration: underline; 
                font-weight: 600; 
            }
            .btn-small { 
                padding: 5px 10px; 
                font-size: 12px; 
                background: #d4af37; 
                color: white; 
                border: none; 
                border-radius: 3px; 
                cursor: pointer; 
            }
            .action-btn { 
                background: #27ae60; 
                color: white; 
                border: none; 
                padding: 12px 30px; 
                font-size: 18px; 
                font-weight: bold; 
                border-radius: 5px; 
                cursor: pointer; 
                transition: 0.3s; 
                margin-top: 15px; 
            }
            .close-btn { 
                position: absolute; 
                top: 10px; 
                right: 20px; 
                color: #333; 
                font-size: 28px; 
                cursor: pointer; 
                font-weight: bold; 
            }
        }
    </style>
</head>
<body>

    <div class="no-print control-panel">
        <h2 style="margin-top:0;">Sistem Cetakan Sijil Daurah 2026</h2>
        
        <div class="filter-section">
            <div>
                <label><strong>1. Tapis Kumpulan:</strong></label><br>
                <select id="group-filter" onchange="filterData()" style="padding: 8px; border-radius: 5px; width: 250px;">
                    <option value="ALL">SEMUA KUMPULAN</option>
                    <option value="DAURAH QURAN USTAZ NUAIM">USTAZ NUAIM</option>
                    <option value="DAURAH QURAN USTAZ ARIF">USTAZ ARIF</option>
                    <option value="DAURAH QURAN USTAZ AIMAN">USTAZ AIMAN</option>
                </select>
            </div>
            <div>
                <label><strong>2. Pilihan Cepat:</strong></label><br>
                <button class="btn-small" onclick="toggleAll(true)">Pilih Semua</button>
                <button class="btn-small" onclick="toggleAll(false)" style="background:#888;">Kosongkan</button>
            </div>
        </div>

        <label><strong>3. Klik Nama untuk Preview | Tanda untuk Cetak:</strong></label>
        <div id="name-list" class="name-selector"></div>

        <button class="action-btn" onclick="generateAndPrint()">CETAK PUKAL (TERPILIH)</button>
        <p id="status-text" style="font-size: 12px; color: #666;">Memuatkan data...</p>
    </div>

    <div id="preview-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePreview()">&times;</span>
            <span class="preview-tag">PRATONTON SIJIL</span>
            
            <div id="preview-area"></div>

            <div style="margin-top: 20px; padding: 20px; border-top: 1px solid #eee; width: 100%; text-align: center;">
                <button class="action-btn" id="modal-print-btn" style="background: #27ae60; width: 300px;">
                    CETAK SIJIL INI (PDF)
                </button>
            </div>
        </div>
    </div>

    <div id="certificate-container"></div>

    <script src="script.js"></script>

</body>
</html>
