<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cetakan Sijil Daurah 2026</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* GAYA UI KHAS UNTUK PANEL KAWALAN */
        @media screen {
            .control-panel {
                position: sticky; 
                top: 0; 
                background: #ffffff; 
                padding: 25px;
                border-bottom: 4px solid #d4af37; 
                z-index: 1000; 
                width: 100%;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
                text-align: center;
            }
            .filter-section { 
                display: flex; 
                gap: 20px; 
                flex-wrap: wrap; 
                justify-content: center; 
                margin-bottom: 20px; 
            }
            .name-selector { 
                max-height: 350px; 
                overflow-y: auto; 
                border: 1px solid #ddd; 
                padding: 15px; 
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 12px; 
                text-align: left; 
                width: 100%; 
                background: #fdfdfd; 
                border-radius: 8px;
            }
            .name-item { 
                background: white;
                padding: 10px;
                border: 1px solid #eee;
                border-radius: 6px;
                font-size: 13px; 
                display: flex; 
                align-items: center; 
                justify-content: space-between;
                transition: 0.2s;
            }
            .name-item:hover {
                border-color: #d4af37;
                background: #fffdf0;
            }
            .preview-link { 
                color: #2c3e50; 
                cursor: pointer; 
                text-decoration: none; 
                font-weight: 700; 
            }
            .btn-small { 
                padding: 5px 10px; 
                font-size: 12px; 
                background: #d4af37; 
                color: white; 
                border: none; 
                border-radius: 3px; 
                cursor: pointer; 
            }

            /* Tombol Aksi List */
            .btn-quick-print { background: #27ae60; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; }
            .btn-quick-telegram { background: #0088cc; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; }

            /* BUTANG PREMIUM PEMBIMBING */
            .btn-pembimbing {
                background: linear-gradient(135deg, #d4af37 0%, #996515 100%);
                color: white;
                border: none;
                padding: 12px 25px;
                border-radius: 50px;
                font-weight: bold;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
                transition: transform 0.2s, box-shadow 0.2s;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .btn-pembimbing:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
            }

            .action-btn { 
                color: white; 
                border: none; 
                padding: 12px 30px; 
                font-size: 16px; 
                font-weight: bold; 
                border-radius: 8px; 
                cursor: pointer; 
                transition: 0.3s; 
                margin-top: 15px; 
            }
            .close-btn { 
                position: absolute; 
                top: 10px; 
                right: 20px; 
                color: #333; 
                font-size: 32px; 
                cursor: pointer; 
                font-weight: bold; 
                z-index: 10001;
            }
            
            .preview-tag {
                background: #d4af37;
                color: white;
                padding: 5px 20px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: bold;
                margin-bottom: 20px;
                display: inline-block;
            }

            .preview-footer {
                margin-top: 20px;
                padding: 20px;
                border-top: 2px solid #ddd;
                width: 100%;
                background: #f9f9f9;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="no-print control-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 20px auto;">
            <h2 style="margin:0; font-family: 'Cinzel', serif; color: #996515;">Sistem Cetakan Sijil Daurah 2026</h2>
            
            <button class="btn-pembimbing" onclick="generateSijilPembimbing()">
                👑 SIJIL PEMBIMBING
            </button>
        </div>
        
        <div class="filter-section">
            <div>
                <label><strong>1. Tapis Kumpulan:</strong></label><br>
                <select id="group-filter" onchange="filterData()" style="padding: 8px; border-radius: 5px; width: 250px;">
                    <option value="ALL">SEMUA KUMPULAN</option>
                    <option value="DAURAH QURAN USTAZ NUAIM">USTAZ NUAIM</option>
                    <option value="DAURAH QURAN USTAZ ARIF">USTAZ ARIF</option>
                    <option value="DAURAH QURAN USTAZ AIMAN">USTAZ AIMAN</option>
                </select>
            </div>
            <div>
                <label><strong>2. Pilihan Cepat:</strong></label><br>
                <button class="btn-small" onclick="toggleAll(true)">Pilih Semua</button>
                <button class="btn-small" onclick="toggleAll(false)" style="background:#888;">Kosongkan</button>
            </div>
            <div>
                <label><strong>3. Orientasi:</strong></label><br>
                <select id="orientation-selector" onchange="updateOrientation()" style="padding: 8px; border-radius: 5px; width: 150px; font-weight: bold; border: 2px solid #d4af37;">
                    <option value="portrait" selected>PORTRAIT</option>
                    <option value="landscape">LANDSCAPE</option>
                </select>
            </div>
        </div>

        <label style="display:block; margin-bottom: 10px;"><strong>4. Senarai Peserta (Klik nama untuk Pralihat):</strong></label>
        <div id="name-list" class="name-selector"></div>

        <div style="display: flex; gap: 15px; justify-content: center;">
            <button class="action-btn" onclick="generateAndPreviewBulk()" style="background: #27ae60;">
                👁️ PREVIEW SEMUA PILIHAN
            </button>

            <button class="action-btn" onclick="hantarSemuaPilihan()" style="background: #e67e22;">
                🚀 AUTO-RUN KE TELEGRAM
            </button>
        </div>
        
        <p id="status-text" style="font-size: 14px; font-weight: bold; color: #333; margin-top: 15px;">Memuatkan data...</p>
    </div>

    <div id="preview-modal" class="no-print" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; overflow-y:auto;">
        <div class="modal-content" style="background:white; width:95%; max-width:1000px; margin:20px auto; padding:20px; border-radius:12px; position:relative;">
            <span class="close-btn" onclick="closePreview()">&times;</span>
            <div style="text-align:center;">
                <div class="preview-tag">DASHBOARD PELARASAN REKA BENTUK</div>
            </div>
            
            <div id="preview-area"></div>

            <div class="preview-footer no-print">
                <p style="margin-bottom: 15px; color: #444; font-weight: 600;">
                    Semak ejaan dan susun atur. Gunakan slider di atas untuk pelarasan pantas.
                </p>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button onclick="window.print()" class="action-btn" style="background: #c0392b; width: 300px; margin-top: 0;">
                        ✅ CETAK SEKARANG
                    </button>
                    <button onclick="closePreview()" class="action-btn" style="background: #7f8c8d; margin-top: 0;">
                        TUTUP
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="certificate-container"></div>

    <script src="print-engine.js"></script>
    <script src="script.js"></script>

</body>
</html>
